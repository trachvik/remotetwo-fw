# SSD1309 display communication test build.
# Minimal: only SPI + display driver, no BT/PWM/encoder/CMSIS.

CONFIG_APP_DISP_TEST=y

# Peripherals
CONFIG_GPIO=y
CONFIG_SPI=y

# Display (SSD1306 driver handles both SSD1306 and SSD1309)
CONFIG_DISPLAY=y
CONFIG_SSD1306=y

# FPU (needed by Zephyr arm init even in minimal builds)
CONFIG_FPU=y
CONFIG_FP_HARDABI=y

# RTT console
CONFIG_SERIAL=n
CONFIG_CONSOLE=y
CONFIG_RTT_CONSOLE=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096
CONFIG_PRINTK=y
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_IMMEDIATE=y

# Disable everything unused
CONFIG_INPUT=n
CONFIG_BT=n
CONFIG_PWM=n
CONFIG_SENSOR=n
CONFIG_CMSIS_DSP=n
