# DRV8311H 3PWM open-loop driver verification build.
# Stand-alone test: no BLE, no display, no encoder, no current sensing.

# App selector (picks DRV_test.c in CMakeLists.txt)
CONFIG_APP_DRV_TEST=y

# Required peripherals
CONFIG_GPIO=y
CONFIG_PWM=y

# Hardware FPU — sinf/cosf in set_phase_voltage
CONFIG_FPU=y
CONFIG_FP_HARDABI=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# RTT console
CONFIG_SERIAL=n
CONFIG_CONSOLE=y
CONFIG_RTT_CONSOLE=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096

# Disable unused subsystems
CONFIG_INPUT=n
CONFIG_BT=n
CONFIG_DISPLAY=n
CONFIG_SSD1306=n
CONFIG_SPI=n
CONFIG_SENSOR=n
CONFIG_CMSIS_DSP=n
