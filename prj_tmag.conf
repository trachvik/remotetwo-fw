# Minimal TMAG5170 debug build

# Core peripherals
CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_SENSOR=y
CONFIG_TMAG5170=y
CONFIG_TMAG5170_CRC=n

# Logging over RTT
CONFIG_SERIAL=n
CONFIG_CONSOLE=y
CONFIG_RTT_CONSOLE=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096

# Keep the build as small as possible for sensor debugging
CONFIG_INPUT=n
CONFIG_BT=n
CONFIG_DISPLAY=n
CONFIG_SSD1306=n
CONFIG_PWM=n
