# Basic Drivers
CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_PWM=y

# Input subsystem (menu button with debounce)
CONFIG_INPUT=y

# Console via RTT (no extra hardware needed, works over J-Link USB)
CONFIG_SERIAL=n
CONFIG_CONSOLE=y
CONFIG_RTT_CONSOLE=y
CONFIG_USE_SEGGER_RTT=y

# CMSIS DSP for ARM math library
CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_DSP_FASTMATH=y

# Printk support
CONFIG_PRINTK=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# FPU Support - Hardware Floating Point Unit
CONFIG_FPU=y
CONFIG_FP_HARDABI=y

# Enable logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_OVERRIDE_LEVEL=0
CONFIG_LOG_PROCESS_THREAD_SLEEP_MS=10

# System tick rate must be >= FOC loop frequency (10 kHz)
CONFIG_SYS_CLOCK_TICKS_PER_SEC=10000

# Bluetooth LE + NUS (for nRF Connect test)
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="remote_two"
CONFIG_BT_DEVICE_APPEARANCE=0
CONFIG_BT_MAX_CONN=1
CONFIG_BT_ZEPHYR_NUS=y

# Display subsystem + Zephyr built-in SSD1306/SSD1309 driver
CONFIG_DISPLAY=y
CONFIG_SSD1306=y

# LVGL rendering (Zephyr integration — requires zephyr,display DT node)
CONFIG_LVGL=y

# LVGL uses a Zephyr k_heap (LV_Z_MEM_POOL_SYS_HEAP=y).
# Default pool is 2 KB — far too small for even a minimal 128x64 OLED:
#   draw buffer (128*8*2B) = 2048 B alone, plus screen object, label, font...
# 32 KB is comfortable for simple UI on a monochrome display.
CONFIG_LV_Z_MEM_POOL_SIZE=32768
# Reduce LVGL internal TLSF pool to match; with LV_Z_MEM_POOL_SYS_HEAP=y
# this value is not the actual allocator but it must not exceed available RAM.
CONFIG_LV_MEM_SIZE_KILOBYTES=16

# System heap for BT stack + LOG deferred buffers + misc allocations.
CONFIG_HEAP_MEM_POOL_SIZE=16384
