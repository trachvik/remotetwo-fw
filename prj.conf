# Základní ovladače
CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_PWM=y

# Console via on-board J-Link UART (no USB device stack needed)
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# CMSIS DSP for ARM math library
CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_DSP_FASTMATH=y

# Printk support
CONFIG_PRINTK=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# FPU Support - Hardware Floating Point Unit
CONFIG_FPU=y
CONFIG_FP_HARDABI=y

# Enable logging
CONFIG_LOG=y

# System tick rate must be >= FOC loop frequency (10 kHz)
CONFIG_SYS_CLOCK_TICKS_PER_SEC=10000
