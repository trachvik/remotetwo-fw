# ==============================================================================
# TEST CODE SELECTOR - uncomment one of the lines below:
# ==============================================================================
#CONFIG_APP_DISP_TEST=y
#CONFIG_APP_DRV_TEST=y

# ==============================================================================
# 1. APPLICATION & SYSTEM
# ==============================================================================

# System tick rate must be >= FOC loop frequency (10 kHz)
CONFIG_SYS_CLOCK_TICKS_PER_SEC=10000

# FPU Support - Hardware Floating Point Unit
CONFIG_FPU=y
CONFIG_FP_HARDABI=y

# CMSIS DSP for ARM math library (Required for FOC)
CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_DSP_FASTMATH=y

# ==============================================================================
# 2. HARDWARE & PERIPHERALS
# ==============================================================================
# Basic drivers
CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_PWM=y

# Display (custom framebuffer, no LVGL)
CONFIG_DISPLAY=y
CONFIG_SSD1306=y

# TMAG5170 angle sensor
CONFIG_SENSOR=y
CONFIG_TMAG5170=y

# Input subsystem (Menu button with debounce)
CONFIG_INPUT=y

# Power management: System OFF (deepest sleep) for the power button.
# NOTE: CONFIG_PM_DEVICE intentionally NOT enabled - it perturbs early device
# init on this target. TMAG5170 deep-sleep is done via a direct register write.
CONFIG_POWEROFF=y

# GPIOTE event handlers - 8 buttons + SPI CS GPIO interrupts + reserve
CONFIG_NRFX_GPIOTE_NUM_OF_EVT_HANDLERS=12

# ==============================================================================
# 3. BLUETOOTH LE + NUS
# ==============================================================================
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="remote_two"
CONFIG_BT_DEVICE_APPEARANCE=0
CONFIG_BT_MAX_CONN=1
CONFIG_BT_ZEPHYR_NUS=y

# Suppress verbose BT stack logs (keep only warnings+)
CONFIG_BT_HCI_CORE_LOG_LEVEL_WRN=y

# ==============================================================================
# 4. USB DEVICE STACK & DFU OTA (Application side)
# ==============================================================================

# Required dependencies for Flash writes and OTA updates
CONFIG_FLASH=y
CONFIG_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y
CONFIG_FLASH_MAP=y

# Disable QSPI NOR flash - nRF5340DK board defconfig enables it by default.
# QSPI uses P0.13-P0.18; P0.18 = INL (motor low-side enable) -> conflict.
# Our DFU secondary slot is in INTERNAL flash (pm_static.yml), no QSPI needed.
CONFIG_NORDIC_QSPI_NOR=n

# Enable USB Device Stack
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y
CONFIG_USB_DEVICE_PRODUCT="Remote Two"
CONFIG_USB_DEVICE_VID=0x2FE3
CONFIG_USB_DEVICE_PID=0x0100

# SMP (Simple Management Protocol) for Over-The-Air/USB firmware updates
CONFIG_ZCBOR=y
CONFIG_MCUMGR=y
CONFIG_BASE64=y
CONFIG_MCUMGR_TRANSPORT_UART=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y

# ==============================================================================
# 5. LOGGING & CONSOLE (Over USB CDC ACM)
# ==============================================================================
# Enable serial console
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_LINE_CTRL=y

# Disable Segger RTT to prevent conflicts with USB logging
CONFIG_RTT_CONSOLE=n
CONFIG_USE_SEGGER_RTT=n

# Logging Subsystem
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_OVERRIDE_LEVEL=0
# Deferred logging: log lines are queued and flushed from a low-priority thread,
# so a stalled/slow USB-CDC terminal can NEVER block the timing-sensitive haptic
# FOC init (immediate mode busy-waits on uart_poll_out and stalled the whole
# boot for ~20 s when the terminal was not draining fast enough).
CONFIG_LOG_MODE_DEFERRED=y

# Printk support (float formatting)
CONFIG_PRINTK=y
CONFIG_CBPRINTF_FP_SUPPORT=y
# Route printk() through the logging subsystem (default) so it shares the
# non-blocking deferred path and cannot busy-wait on USB-CDC either.
CONFIG_LOG_PRINTK=y