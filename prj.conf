# Zakladni ovladace
CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_PWM=y

# Sensor subsystem (TMAG5170 angle encoder)
CONFIG_SENSOR=y
CONFIG_TMAG5170=y
CONFIG_TMAG5170_CRC=n
CONFIG_SENSOR_LOG_LEVEL_DBG=y

# Input subsystem (menu button with debounce)
CONFIG_INPUT=y

# Console via RTT
CONFIG_SERIAL=n
CONFIG_CONSOLE=y
CONFIG_RTT_CONSOLE=y
CONFIG_USE_SEGGER_RTT=y

# CMSIS DSP for ARM math library
CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_DSP_FASTMATH=y

# Printk support
CONFIG_PRINTK=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# FPU Support - Hardware Floating Point Unit
CONFIG_FPU=y
CONFIG_FP_HARDABI=y

# Enable logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_OVERRIDE_LEVEL=0
CONFIG_LOG_MODE_IMMEDIATE=y

# System tick rate must be >= FOC loop frequency (10 kHz)
CONFIG_SYS_CLOCK_TICKS_PER_SEC=10000

# Bluetooth LE + NUS
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="remote_two"
CONFIG_BT_DEVICE_APPEARANCE=0
CONFIG_BT_MAX_CONN=1
CONFIG_BT_ZEPHYR_NUS=y

# Display (custom framebuffer, no LVGL)
CONFIG_DISPLAY=y
CONFIG_SSD1306=y
# RTT buffer - prevent log overflow during BT init
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096

# Suppress verbose BT stack logs (keep only warnings+)
CONFIG_BT_HCI_CORE_LOG_LEVEL_WRN=y

# Debug build — použij -Og místo -Os pro čitelnější GDB krokování
# Odkomentuj před debugováním, zakomentuj pro release build
# CONFIG_DEBUG_OPTIMIZATIONS=y
# CONFIG_DEBUG_THREAD_INFO=y