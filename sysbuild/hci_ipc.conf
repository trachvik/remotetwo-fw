# Network-core (hci_ipc) Kconfig overlay for the RemoteTwo board.
#
# uart0 is disabled in sysbuild/hci_ipc.overlay to free P0.10 (the app-core SPI
# MOSI) which the net-core console otherwise claims as UART_CTS. The DK net-core
# devicetree still has chosen { zephyr,console = &uart0 }, so build the image
# without a serial console to avoid a dangling reference to the disabled node.
# hci_ipc only needs the IPC service to talk to the app core.
CONFIG_SERIAL=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
